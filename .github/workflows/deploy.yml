name: Deploy Edge Function

on:
  push:
    branches:
      - main # Ensure this matches your branch name (main or master)
    paths:
      - 'adhdapp/supabase/functions/**'
  workflow_dispatch: # THIS LINE ENABLES THE MANUAL "FORCE" BUTTON

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Function
        run: |
          cd adhdapp
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --password ${{ secrets.SUPABASE_DB_PASSWORD }}
          supabase functions deploy generate-content --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
